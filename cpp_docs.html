<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetScope — C++ Engine Docs</title>
    <!-- Use Syne and Inter fonts from the main app -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Github Markdown CSS - Dark mode theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-dark.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0c111d; /* Deep cyberpunk navy */
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .header {
            padding: 20px 40px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--surface-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-back {
            display: inline-flex;
            align-items: center;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-back:hover {
            color: var(--text-0);
        }

        .docs-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            height: calc(100vh - 80px);
            position: sticky;
            top: 80px;
            overflow-y: auto;
            padding: 40px 20px;
            border-right: 1px solid var(--surface-border);
            background: rgba(15, 23, 42, 0.2);
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--surface-border);
            border-radius: 10px;
        }

        .nav-title {
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-3);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin-bottom: 4px;
        }

        .nav-link {
            display: block;
            padding: 8px 12px;
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.88rem;
            border-radius: 6px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .nav-link:hover {
            background: rgba(56, 189, 248, 0.05);
            color: var(--accent);
        }

        .nav-link.active {
            background: rgba(56, 189, 248, 0.08);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .nav-link.h2 {
            padding-left: 24px;
            font-size: 0.82rem;
            opacity: 0.8;
        }

        /* Main Content */
        .markdown-wrapper {
            flex: 1;
            padding: 40px 60px;
            min-width: 0; /* Prevents overflow in flexbox */
        }

        .markdown-body {
            box-sizing: border-box;
            background-color: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-lg);
            padding: 60px;
            color: var(--text-1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            font-family: 'Inter', sans-serif;
        }

        /* Custom overrides to match our cyberpunk theme */
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            font-family: 'Syne', sans-serif;
            color: var(--text-0);
            border-bottom-color: var(--surface-border);
            scroll-margin-top: 100px; /* Offset for sticky header */
        }
        .markdown-body a {
            color: var(--accent);
        }
        .markdown-body pre {
            background-color: #0c111d;
            border: 1px solid var(--surface-border);
        }
        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }
        .markdown-body pre code {
            background-color: transparent;
            color: var(--text-1);
        }
        .markdown-body table tr {
            background-color: transparent;
            border-top-color: var(--surface-border);
        }
        .markdown-body table tr:nth-child(2n) {
            background-color: rgba(15, 23, 42, 0.4);
        }
        .markdown-body table th, .markdown-body table td {
            border-color: var(--surface-border);
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }
            .markdown-wrapper {
                padding: 20px;
            }
        }

        @media (max-width: 767px) {
            .markdown-body {
                padding: 30px 20px;
            }
            .header {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="header-back">← Back to Dashboard</a>
        <div style="font-family: 'Syne', sans-serif; font-weight: 700; color: var(--text-3); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;">Documentation</div>
    </div>
    
    <div class="docs-layout">
        <aside class="sidebar" id="sidebar">
            <div class="nav-title">On this page</div>
            <ul class="nav-list" id="nav-list">
                <!-- Nav items will be auto-generated -->
            </ul>
        </aside>

        <main class="markdown-wrapper">
            <article class="markdown-body" id="content">
                <p style="color: var(--text-3); text-align: center;">Loading documentation...</p>
            </article>
        </main>
    </div>

    <!-- Marked JS for converting Markdown to HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('engine/README.md')
            .then(response => {
                if (!response.ok) throw new Error("Could not fetch engine/README.md");
                return response.text();
            })
            .then(text => {
                const contentEl = document.getElementById('content');
                const navListEl = document.getElementById('nav-list');
                
                // Parse markdown
                contentEl.innerHTML = marked.parse(text);

                // Auto-generate navigation
                const headings = contentEl.querySelectorAll('h1, h2');
                headings.forEach((heading, index) => {
                    // Create ID if not exists
                    const id = heading.textContent.toLowerCase().replace(/[^\w]+/g, '-');
                    heading.id = id;

                    // Create nav item
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    
                    const a = document.createElement('a');
                    a.href = '#' + id;
                    a.textContent = heading.textContent;
                    a.className = 'nav-link' + (heading.tagName === 'H2' ? ' h2' : '');
                    
                    li.appendChild(a);
                    navListEl.appendChild(li);
                });

                // Intersection Observer for active state
                const observerOptions = {
                    rootMargin: '-10% 0px -80% 0px',
                    threshold: 0
                };

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const id = entry.target.id;
                            // Clear all active
                            document.querySelectorAll('.nav-link').forEach(link => {
                                link.classList.remove('active');
                            });
                            // Set active
                            const activeLink = document.querySelector(`.nav-link[href="#${id}"]`);
                            if (activeLink) activeLink.classList.add('active');
                        }
                    });
                }, observerOptions);

                headings.forEach(h => observer.observe(h));
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `<p style="color: #ef4444;">Error loading docs: ${error.message}</p>`;
                console.error(error);
            });
    </script>
</body>
</html>
